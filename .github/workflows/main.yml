name: CI Pipeline

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build-and-test:
runs-on: ubuntu-latest

```
steps:
- name: Checkout repository
  uses: actions/checkout@v4

- name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.11"

- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: Check project structure
  run: |
    echo "Listing project files"
    ls -R

- name: Lint (basic syntax check)
  run: |
    python -m py_compile app/app.py
    python -m py_compile app/frontend.py
    python -m py_compile src/predict.py

- name: Run basic import test
  run: |
    python -c "from src.predict import predict_transaction; print('Import successful')"

- name: Start FastAPI server (test run)
  run: |
    nohup uvicorn app.app:app --host 127.0.0.1 --port 8000 &
    sleep 5
    curl http://127.0.0.1:8000 || exit 1

- name: Test prediction endpoint
  run: |
    curl -X POST "http://127.0.0.1:8000/init_user" \
    -H "Content-Type: application/json" \
    -d '{"user_id":"test_user","balance":10000}'

    curl -X POST "http://127.0.0.1:8000/predict" \
    -H "Content-Type: application/json" \
    -d '{"user_id":"test_user","type":"PAYMENT","amount":100,"nameDest":"M1"}'
